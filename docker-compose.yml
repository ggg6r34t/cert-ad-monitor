# ============================================================
# CERT Ad Monitor — Docker Compose
# ============================================================
# Usage:
#   docker compose up -d          Start in background
#   docker compose logs -f        View logs
#   docker compose down           Stop
#   docker compose up -d --build  Rebuild after code changes
# ============================================================

services:
  cert-ad-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cert-ad-monitor
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # Optional: set token here so team doesn't need to enter it in UI
      # Can also be set via .env file (see below)
      - META_AD_LIBRARY_TOKEN=${META_AD_LIBRARY_TOKEN:-}
      - NODE_ENV=production
    # Resource limits (adjust to your host)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"