# ============================================================
# CERT Ad Monitor - Docker Compose
# ============================================================
# Usage:
#   docker compose up -d          Start in background
#   docker compose logs -f        View logs
#   docker compose down           Stop
#   docker compose up -d --build  Rebuild after code changes
# ============================================================

services:
  cert-ad-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cert-ad-monitor
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - META_AD_LIBRARY_TOKEN=${META_AD_LIBRARY_TOKEN:-}
      - NODE_ENV=production
      - APP_DATA_DIR=/app/data
      - APP_ENCRYPTION_KEY=${APP_ENCRYPTION_KEY:-}
      - AUTO_SCAN_ENABLED=${AUTO_SCAN_ENABLED:-false}
      - AUTO_SCAN_INTERVAL_MINUTES=${AUTO_SCAN_INTERVAL_MINUTES:-30}
      - AUTO_SCAN_MAX_PAGES=${AUTO_SCAN_MAX_PAGES:-3}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - cert-ad-monitor-data:/app/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  cert-ad-monitor-data:
